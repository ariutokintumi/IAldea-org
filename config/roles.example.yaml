# Ejemplo de roles por cargo (sin personas). Copiar a roles.yaml o fusionar con policy_config según el despliegue.
# Modelo canónico: docs/roles/permission-matrix.csv y docs/roles/role-model.md

roles:
  authorities:
    - secretaria
    - coordinacion
  committees:
    - comite_agua
    - comite_obras
  treasury:
    - tesoreria
  validation:
    - validador
  citizen:
    - ciudadano
  financier:
    - financiador

# Quién puede cambiar políticas del sistema (debe existir en roles.*)
config_admins:
  - secretaria
